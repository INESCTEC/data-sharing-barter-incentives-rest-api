# ------------------------
# HTTPS (port 443)
# ------------------------
# This server block handles the secure connections to the Django application
# It serves static and media files, and proxies requests to the Django app running in a Docker container
# It also sets up SSL using Let's Encrypt certificates
# The server_name directive should match the domain name used for the SSL certificate
# The ssl_certificate and ssl_certificate_key directives should point to the correct certificate files
# The client_max_body_size directive is set to allow large file uploads (500M in this case)
# The location blocks define how requests to specific paths are handled
# The first location block serves static files from the specified directory
# The second location block serves media files from the specified directory
# The final location block proxies all other requests to the Django application running in a Docker container
# The proxy_set_header directives ensure that the correct headers are passed to the Django application
# The proxy_read_timeout, proxy_send_timeout, and keepalive_timeout directives are set to allow
# long-running requests, which is useful for applications that may take a while to respond
# The proxy_pass directive specifies the address of the Django application running in a Docker container
# The app:8000 address assumes that the Django application is running in a Docker container named "app" on port 8000

server {
    listen 443 ssl;
    server_name predico02.inesctec.pt;

    ssl_certificate     /etc/letsencrypt/live/predico02.inesctec.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/predico02.inesctec.pt/privkey.pem;

    client_max_body_size 500M;

    # Static files
    location /staticfiles/ {
        alias /usr/src/api/staticfiles/;
    }

    location /mediafiles/ {
        alias /usr/src/api/mediafiles/;
    }

    # Proxy to Django app
    location / {
        proxy_pass http://app:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $server_name;

        proxy_read_timeout  1200s;
        proxy_send_timeout  1200s;
        keepalive_timeout   1200s;
    }
}