version: "3.7"

services:
  postgresql:
    image: postgres:12.0-alpine
    container_name: predico_enershare_postgresql
    restart: always
    env_file:
      - api/.dev.env
    ports:
      - "5432"
    volumes:
      - postgresql-enershare-data:/var/lib/postgresql/data
    networks:
      - predico_network

  app:
#    platform: linux/amd64
    build:
      context: api
      args:
        POETRY_HTTP_BASIC_GITLAB_PAYMENT_USERNAME: "__token__"
        POETRY_HTTP_BASIC_GITLAB_PAYMENT_PASSWORD: "${GITLAB_TOKEN}"
    container_name: predico_enershare_rest_app
    environment:
      - WAIT_HOSTS=postgresql:5000
    restart: unless-stopped
    env_file:
      - api/.dev.env
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - postgresql
    ports:
      - "8081:8000"
    networks:
      - predico_network

volumes:
  postgresql-enershare-data:

networks:
  predico_network:
    driver: bridge